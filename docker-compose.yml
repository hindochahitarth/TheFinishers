version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: greenpulse_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-greenpulse_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-greenpulse}
      MYSQL_USER: ${MYSQL_USER:-gpuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gppassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: greenpulse_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: greenpulse_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER:-gpuser}:${MYSQL_PASSWORD:-gppassword}@db:3306/${MYSQL_DATABASE:-greenpulse}
      - REDIS_URL=redis://redis:6379/0
      - OPENWEATHER_API_KEY=${OPENWEATHERMAP_API_KEY}
      - OPENAQ_API_KEY=${OPENAQ_API_KEY}
      - TOMTOM_API_KEY=${TOMTOM_API_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - SECRET_KEY=${SECRET_KEY:-supersecretjwtkey}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml_models:/app/ml_models
      - ./data_pipeline:/app/data_pipeline
      - ./ai_agents:/app/ai_agents
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: greenpulse_scheduler
    restart: always
    environment:
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER:-gpuser}:${MYSQL_PASSWORD:-gppassword}@db:3306/${MYSQL_DATABASE:-greenpulse}
      - REDIS_URL=redis://redis:6379/0
      - OPENWEATHER_API_KEY=${OPENWEATHERMAP_API_KEY}
      - OPENAQ_API_KEY=${OPENAQ_API_KEY}
      - TOMTOM_API_KEY=${TOMTOM_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml_models:/app/ml_models
      - ./data_pipeline:/app/data_pipeline
    command: python -m data_pipeline.ingestion.scheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: greenpulse_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
